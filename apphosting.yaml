# Firebase App Hosting Configuration
# https://firebase.google.com/docs/app-hosting

runConfig:
  # จำนวน instance ขั้นต่ำที่จะทำงานอยู่ตลอดเวลา
  # 0 = ประหยัดเงิน แต่มี cold start (2-5 วินาที)
  # 1 = เร็วตลอด แต่มีค่าใช้จ่าย (~$18-25/เดือน)
  minInstances: 0

  # จำนวน instance สูงสุดที่สามารถขยายได้เมื่อมี traffic เยอะ
  maxInstances: 10

  # CPU cores ต่อ instance (1-8)
  # 1 = เหมาะกับ traffic ปกติ
  # 2-4 = เหมาะกับ traffic สูง หรือ processing หนัก
  cpu: 1

  # RAM (memory) ต่อ instance ในหน่วย MiB
  # 512 = Next.js baseline (ก่อนมี RAG)
  # 1024 = OOM (SIGABRT signal 6) เพราะ Node V8 heap default 512 MB ไม่พอ + Firestore batch load
  # 2048 = ปัจจุบัน — RAG โหลด 1,673 chunks × 3072-dim + Firestore SDK overhead + concurrent
  memoryMiB: 2048

  # Concurrency - จำนวน requests ที่ instance หนึ่งจัดการพร้อมกันได้
  # Default: 80
  # เพิ่มถ้า requests เบา (เช่น API ง่ายๆ)
  # ลดถ้า requests หนัก (เช่น image processing)
  concurrency: 80

# Environment Variables
# สำหรับ Firebase App Hosting ต้องระบุทั้ง BUILD และ RUNTIME availability
env:
  - variable: NODE_ENV
    value: production
    availability:
      - BUILD
      - RUNTIME

  # Node.js V8 heap size — ให้ heap ใช้ได้เต็ม container memory (2 GiB - 256 MB reserved)
  # โดย default V8 จำกัด heap 512 MB ทำให้ RAG (1,673 vectors × 3072-dim) OOM แม้ container memory เยอะ
  - variable: NODE_OPTIONS
    value: "--max-old-space-size=1792"
    availability:
      - RUNTIME

  - variable: NEXT_PUBLIC_APP_NAME
    value: "Mekong Fish Dashboard"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_APP_VERSION
    value: "1.0.0"
    availability:
      - BUILD
      - RUNTIME

  # Firebase Configuration
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: AIzaSyBqDCZidQSSGzhZu0hS1bZtxD4pJLYvIgY
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: tracking-fish-app.firebaseapp.com
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: tracking-fish-app
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: tracking-fish-app.firebasestorage.app
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "587580376587"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: 1:587580376587:web:a35c9caf6acab6a110290e
    availability:
      - BUILD
      - RUNTIME

  # Google Maps API Key
  - variable: NEXT_PUBLIC_GOOGLE_MAPS_API_KEY
    value: AIzaSyAiXjNpIp6OwXf4VF8wfE-SM7GO2IUO6pE
    availability:
      - BUILD
      - RUNTIME

  # Gemini AI API Key (stored in Secret Manager)
  - variable: GEMINI_API_KEY
    secret: GEMINI_API_KEY
    availability:
      - RUNTIME

  # Firebase Admin SDK Service Account JSON (for verifyIdToken in API routes)
  - variable: FIREBASE_SERVICE_ACCOUNT
    secret: FIREBASE_SERVICE_ACCOUNT
    availability:
      - RUNTIME

  # Note: These are NEXT_PUBLIC_* variables which are embedded in client-side code
  # and are not sensitive secrets. They are safe to include in apphosting.yaml.
  # The API keys have restrictions configured in Google Cloud Console.
